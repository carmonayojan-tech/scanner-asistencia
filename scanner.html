<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escáner QR – Asistencia</title>

  <!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  CONFIGURACIÓN — edita solo esta línea con tu URL del       ║
  ║  Web App de Google Apps Script                              ║
  ╚══════════════════════════════════════════════════════════════╝
  -->
  <script>
    const APP_URL = 'https://script.google.com/u/0/home/projects/1z00MpDEYg_dchWMQGEnbBtnW_pJoGhxWh4jFzS2XGefs1mvlWuG4DtcU/edit?pli=1';
    //               ↑ Reemplaza con tu URL real del Web App
  </script>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 16px 48px rgba(0,0,0,.28);
      padding: 26px 22px;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }
    .logo { font-size: 36px; margin-bottom: 6px; }
    h1 { font-size: 22px; color: #0f172a; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #64748b; margin-bottom: 18px; line-height: 1.5; }

    /* Selector INGRESO / SALIDA */
    .estado-wrap { display: flex; gap: 10px; margin-bottom: 16px; }
    .estado-btn {
      flex: 1; padding: 11px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: #f8fafc;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: .18s;
      color: #334155;
    }
    .estado-btn.active { border-color: #2196F3; background: #2196F3; color: #fff; }

    /* Visor de cámara */
    #qr-reader { width: 100%; border-radius: 14px; overflow: hidden; margin-bottom: 14px; background: #000; min-height: 260px; }
    #qr-reader video { border-radius: 14px; }
    /* Ocultar barra inferior de html5-qrcode */
    #qr-reader__dashboard { display: none !important; }

    /* Resultado */
    #resultado {
      display: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px; font-weight: 600;
      margin-bottom: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .ok   { background: #dcfce7; color: #166534; border: 1.5px solid #86efac; }
    .warn { background: #fef3c7; color: #92400e; border: 1.5px solid #fcd34d; }
    .err  { background: #fee2e2; color: #b91c1c; border: 1.5px solid #fca5a5; }

    /* Botón cerrar */
    .btn-cerrar {
      width: 100%; padding: 14px;
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; color: #fff;
      background: #ef4444; transition: .18s;
    }
    .btn-cerrar:hover { background: #dc2626; }

    /* Indicador de carga */
    #loading {
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      padding: 24px 0; color: #64748b; font-size: 14px;
    }
    .spinner {
      width: 38px; height: 38px;
      border: 4px solid #e2e8f0;
      border-top-color: #2196F3;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">📷</div>
  <h1>Escáner QR</h1>
  <p class="sub">Apunta la cámara al código QR del estudiante</p>

  <div class="estado-wrap">
    <button class="estado-btn active" id="btn-ingreso" onclick="setEstado('INGRESO')">INGRESO</button>
    <button class="estado-btn"        id="btn-salida"  onclick="setEstado('SALIDA')">SALIDA</button>
  </div>

  <div id="qr-reader">
    <div id="loading">
      <div class="spinner"></div>
      <span>Iniciando cámara...</span>
    </div>
  </div>

  <div id="resultado"></div>

  <button class="btn-cerrar" onclick="cerrar()">Cerrar escáner</button>
</div>

<script>
  let estadoActual = 'INGRESO';
  let procesando   = false;
  let scanner      = null;

  /* ── Selector de estado ── */
  function setEstado(e) {
    estadoActual = e;
    document.getElementById('btn-ingreso').classList.toggle('active', e === 'INGRESO');
    document.getElementById('btn-salida').classList.toggle('active',  e === 'SALIDA');
  }

  /* ── Mostrar resultado ── */
  function mostrar(msg, tipo, autoOcultar) {
    const r = document.getElementById('resultado');
    r.textContent = msg;
    r.className   = tipo;
    r.style.display = 'block';
    if (autoOcultar) setTimeout(() => { r.style.display = 'none'; procesando = false; }, autoOcultar);
  }

  /* ── Registrar vía JSONP (evita CORS) ── */
  function registrar(id) {
    if (procesando) return;
    procesando = true;
    mostrar('⏳ Procesando: ' + id, 'warn', 0);

    const cbName = 'cb_' + Date.now();
    const script = document.createElement('script');
    let timeout;

    window[cbName] = function(data) {
      clearTimeout(timeout);
      script.remove();
      delete window[cbName];
      if (data.exito) {
        mostrar('✅ ' + data.estado + ': ' + data.nombre + '\n🕐 ' + data.hora, 'ok', 3500);
      } else {
        mostrar('⚠️ ' + data.mensaje, 'warn', 3000);
      }
    };

    timeout = setTimeout(function() {
      script.remove();
      delete window[cbName];
      mostrar('❌ Tiempo de espera agotado. Verifique conexión.', 'err', 3000);
    }, 10000);

    script.src = APP_URL
      + '?page=registrar_jsonp'
      + '&callback=' + cbName
      + '&id='       + encodeURIComponent(id)
      + '&estado='   + encodeURIComponent(estadoActual);

    document.head.appendChild(script);
  }

  /* ── Iniciar scanner ── */
  function iniciarScanner() {
    scanner = new Html5Qrcode('qr-reader');

    // Preferir cámara trasera en móvil, cualquiera en laptop
    const config = { fps: 8, qrbox: { width: 240, height: 240 } };

    scanner.start(
      { facingMode: 'environment' },
      config,
      function(decoded) { registrar(decoded.trim()); },
      function() { /* frame sin QR — ignorar */ }
    )
    .then(function() {
      document.getElementById('loading').style.display = 'none';
    })
    .catch(function() {
      // Si 'environment' falla (ej: laptop sin cámara trasera), intentar con cámara frontal/por defecto
      scanner.start(
        { facingMode: 'user' },
        config,
        function(decoded) { registrar(decoded.trim()); },
        function() {}
      )
      .then(function() {
        document.getElementById('loading').style.display = 'none';
      })
      .catch(function(err) {
        document.getElementById('loading').innerHTML =
          '<p style="color:#b91c1c;font-size:14px;padding:16px">' +
          '❌ No se pudo acceder a la cámara.<br><br>' +
          '<strong>Solución:</strong> Asegúrese de que esta página tiene permisos de cámara.<br>' +
          'En el navegador haga clic en el icono 🔒 o 📷 junto a la URL y permita la cámara.' +
          '</p>';
      });
    });
  }

  /* ── Cerrar ── */
  function cerrar() {
    if (scanner) {
      scanner.stop().catch(() => {}).finally(() => { window.close(); });
    } else {
      window.close();
    }
  }

  /* ── Arrancar al cargar ── */
  window.addEventListener('load', iniciarScanner);
</script>
</body>
</html>
